<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <!-- Brand color swatches -->
  <!-- Orange -->
  <rect x="0" y="0" width="88" height="88" rx="12" fill="#f97316"/>
  <text x="44" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#71717a">Brand Orange</text>
  <text x="44" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a1a1aa">#f97316</text>

  <!-- Purple -->
  <rect x="100" y="0" width="88" height="88" rx="12" fill="#a855f7"/>
  <text x="144" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#71717a">Brand Purple</text>
  <text x="144" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a1a1aa">#a855f7</text>

  <!-- Blue -->
  <rect x="200" y="0" width="88" height="88" rx="12" fill="#3b82f6"/>
  <text x="244" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#71717a">Brand Blue</text>
  <text x="244" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a1a1aa">#3b82f6</text>

  <!-- Background dark -->
  <rect x="300" y="0" width="88" height="88" rx="12" fill="#09090b" stroke="#27272a" stroke-width="1"/>
  <text x="344" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#71717a">Background</text>
  <text x="344" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a1a1aa">#09090b</text>

  <!-- Gradient bar -->
  <rect x="0" y="148" width="480" height="10" rx="5" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="480" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
</svg>
